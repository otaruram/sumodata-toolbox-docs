<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Isometric cube structure -->
  <g transform="translate(64, 40)">
    <!-- Top face -->
    <path d="M 0,-30 L 35,-15 L 35,15 L 0,30 L -35,15 L -35,-15 Z" 
          fill="url(#grad1)" 
          stroke="#00d4ff" 
          stroke-width="2"/>
    
    <!-- Left face -->
    <path d="M -35,-15 L -35,15 L -35,45 L 0,60 L 0,30 Z" 
          fill="url(#grad2)" 
          stroke="#00d4ff" 
          stroke-width="2"/>
    
    <!-- Right face -->
    <path d="M 35,-15 L 35,15 L 35,45 L 0,60 L 0,30 Z" 
          fill="url(#grad3)" 
          stroke="#00d4ff" 
          stroke-width="2"/>
    
    <!-- Inner symbols -->
    <!-- Database cylinder -->
    <ellipse cx="-15" cy="5" rx="8" ry="4" fill="#00d4ff" opacity="0.8"/>
    <rect x="-23" y="5" width="16" height="12" fill="#00d4ff" opacity="0.6"/>
    <ellipse cx="-15" cy="17" rx="8" ry="4" fill="#00d4ff" opacity="0.8"/>
    
    <!-- Network graph nodes -->
    <circle cx="15" cy="0" r="3" fill="#00ffaa" opacity="0.9"/>
    <circle cx="20" cy="12" r="3" fill="#00ffaa" opacity="0.9"/>
    <circle cx="10" cy="12" r="3" fill="#00ffaa" opacity="0.9"/>
    <line x1="15" y1="0" x2="20" y2="12" stroke="#00ffaa" stroke-width="1.5" opacity="0.7"/>
    <line x1="15" y1="0" x2="10" y2="12" stroke="#00ffaa" stroke-width="1.5" opacity="0.7"/>
    <line x1="20" y1="12" x2="10" y2="12" stroke="#00ffaa" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Wrench icon -->
    <path d="M -5,25 L -2,28 L 2,24 L 5,27 L 8,24 L 4,20 L 0,24 L -3,21 Z" 
          fill="#ffaa00" 
          opacity="0.9"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#004499;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="grad3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0088dd;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#0055aa;stop-opacity:0.8" />
    </linearGradient>
  </defs>
</svg>
