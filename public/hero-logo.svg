<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Large hero version -->
  <g transform="translate(128, 80)">
    <!-- Top face -->
    <path d="M 0,-60 L 70,-30 L 70,30 L 0,60 L -70,30 L -70,-30 Z" 
          fill="url(#heroGrad1)" 
          stroke="#00d4ff" 
          stroke-width="3"/>
    
    <!-- Left face -->
    <path d="M -70,-30 L -70,30 L -70,90 L 0,120 L 0,60 Z" 
          fill="url(#heroGrad2)" 
          stroke="#00d4ff" 
          stroke-width="3"/>
    
    <!-- Right face -->
    <path d="M 70,-30 L 70,30 L 70,90 L 0,120 L 0,60 Z" 
          fill="url(#heroGrad3)" 
          stroke="#00d4ff" 
          stroke-width="3"/>
    
    <!-- Inner symbols (larger) -->
    <!-- Database -->
    <ellipse cx="-30" cy="10" rx="16" ry="8" fill="#00d4ff" opacity="0.9"/>
    <rect x="-46" y="10" width="32" height="24" fill="#00d4ff" opacity="0.7"/>
    <ellipse cx="-30" cy="34" rx="16" ry="8" fill="#00d4ff" opacity="0.9"/>
    
    <!-- Network graph -->
    <circle cx="30" cy="0" r="6" fill="#00ffaa" opacity="0.95"/>
    <circle cx="40" cy="24" r="6" fill="#00ffaa" opacity="0.95"/>
    <circle cx="20" cy="24" r="6" fill="#00ffaa" opacity="0.95"/>
    <line x1="30" y1="0" x2="40" y2="24" stroke="#00ffaa" stroke-width="3" opacity="0.8"/>
    <line x1="30" y1="0" x2="20" y2="24" stroke="#00ffaa" stroke-width="3" opacity="0.8"/>
    <line x1="40" y1="24" x2="20" y2="24" stroke="#00ffaa" stroke-width="3" opacity="0.8"/>
    
    <!-- Wrench -->
    <path d="M -10,50 L -4,56 L 4,48 L 10,54 L 16,48 L 8,40 L 0,48 L -6,42 Z" 
          fill="#ffaa00" 
          opacity="0.95"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="heroGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="heroGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#004499;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="heroGrad3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0088dd;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0055aa;stop-opacity:0.95" />
    </linearGradient>
  </defs>
</svg>
